<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AeroSmart Airlines</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<nav class="sidebar">
        <h2>AeroSmart ✈️</h2>
        
        <div id="userInfo" style="display: none; padding: 15px; background: #e0f2fe; border-radius: 8px; margin-bottom: 10px;">
            <span id="userNameDisplay" style="color: #0369a1;"></span>
            <button onclick="logout()" style="background: #ef4444; width: 100%; margin-top: 10px; padding: 8px;">Logout</button>
        </div>

        <button onclick="navigate('search')">Search Flights</button>
        <button id="navLoginBtn" onclick="navigate('login')">Login / Register</button> 
        <button onclick="loadItinerary()">My Itinerary</button>
        
        <div class="ai-widget">
            <h4>AI Assistant</h4>
            <input type="text" id="aiInput" placeholder="E.g., Book a flight...">
            <button onclick="askAI()">Ask</button>
            <p id="aiResponse"></p>
        </div>
    </nav>

    <main id="app-root">
        </main>

    <script src="app.js"></script>
</body>
</html>
